<form>
<legend>Registration Form</legend>
<br>
<label for="username">Enter your username:</label>
<input type="text" id="username" name="username" placeholder="Enter your username" maxlength="20">
<br>
<label for="password">Enter your password:</label>
<input type="password" id="password" name="password" placeholder="Enter your password" maxlength="20">
<br>
<br>
<input type="button" value="Click me" onclick="alert('Clock ittt!')">
<br><br>
<input type="submit" value="Submit">
<input type="reset" value="Reset"><br>
<input type="checkbox" name="subscribe" id="subscribe" checked><br>

<br>

<input type="radio" name="gender" id="female" value="female">

<br><br>

<input type="file" name="profile-pic" accept="image/*" multiple><br>

<input type="image" src="t-shirt.jpeg" alt="T-shirt" width="100">
<br>
<label for="email">Enter your email:</label>
<input type="email" name="email" required placeholder="you@example.com">

</form>
