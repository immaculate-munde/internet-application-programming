<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To Do</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f55a;
      --accent-dim: #8aab2a;
      --text: #f0ede6;
      --muted: #666;
      --done: #3a3a3a;
      --done-text: #555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .header {
      margin-bottom: 48px;
    }

    .header .label {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
    }

    .stats {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .input-row button {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 14px 22px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover { background: #d4ff6a; }
    .input-row button:active { transform: scale(0.97); }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 36px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: #444; }

    .todo-item.done {
      background: transparent;
      border-color: #1e1e1e;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .todo-item.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox svg {
      display: none;
    }

    .todo-item.done .checkbox svg {
      display: block;
    }

    .todo-text {
      flex: 1;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      transition: color 0.2s;
    }

    .todo-item.done .todo-text {
      color: var(--done-text);
      text-decoration: line-through;
      text-decoration-color: #444;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .todo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ff6b6b; }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 40px 0;
      letter-spacing: 0.08em;
    }

    .clear-btn {
      display: block;
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      margin-bottom: 48px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="label">— your tasks</div>
      <h1>To<span>.</span>Do</h1>
      <div class="stats" id="stats">0 tasks remaining</div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="add a new task..." maxlength="120" />
      <button onclick="addTask()">Add</button>
    </div>

    <div class="section-label">Tasks</div>
    <ul class="todo-list" id="todoList"></ul>

    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function render() {
      const list = document.getElementById('todoList');
      const remaining = tasks.filter(t => !t.done).length;
      const total = tasks.length;

      document.getElementById('stats').textContent =
        total === 0 ? '0 tasks' :
        remaining === 0 ? 'all done ✓' :
        `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;

      const pct = total > 0 ? ((total - remaining) / total) * 100 : 0;
      document.getElementById('progress').style.width = pct + '%';

      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty">nothing here yet — add something above</div>';
        return;
      }

      list.innerHTML = tasks.map((t, i) => `
        <li class="todo-item ${t.done ? 'done' : ''}" onclick="toggle(${i})">
          <div class="checkbox">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4L3.5 6.5L9 1" stroke="#0e0e0e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="todo-text">${escHtml(t.text)}</span>
          <button class="delete-btn" onclick="remove(event, ${i})">×</button>
        </li>
      `).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ text, done: false });
      input.value = '';
      save(); render();
    }

    function toggle(i) {
      tasks[i].done = !tasks[i].done;
      save(); render();
    }

    function remove(e, i) {
      e.stopPropagation();
      tasks.splice(i, 1);
      save(); render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
