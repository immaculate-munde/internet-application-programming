<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow — To-Do</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #22222a;
    --border: #2e2e3a;
    --accent: #c8f04a;
    --accent2: #ff6b6b;
    --accent3: #6bcfff;
    --text: #f0f0f5;
    --text-muted: #7a7a8c;
    --shadow: 0 4px 32px rgba(0,0,0,0.5);
    --toggle-bg: #22222a;
    --done-opacity: 0.4;
  }
  :root[data-theme="light"] {
    --bg: #f4f4ee;
    --surface: #ffffff;
    --surface2: #efefea;
    --border: #dcdcd4;
    --accent: #2d7a00;
    --accent2: #d93a3a;
    --accent3: #0077b6;
    --text: #111114;
    --text-muted: #888880;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --toggle-bg: #e4e4dc;
    --done-opacity: 0.45;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    padding: 0 0 80px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 36px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.04em;
  }
  .logo span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .stats {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .toggle-wrap { display: flex; align-items: center; gap: 8px; }
  .toggle-label { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .toggle {
    width: 48px; height: 26px;
    background: var(--toggle-bg);
    border-radius: 13px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform 0.3s;
  }
  [data-theme="light"] .toggle::after { transform: translateX(22px); }

  main { max-width: 740px; margin: 0 auto; padding: 36px 24px 0; }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 32px;
    box-shadow: var(--shadow);
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .task-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border 0.2s;
  }
  .task-input:focus { border-color: var(--accent); }
  .task-input::placeholder { color: var(--text-muted); }

  .add-btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; }
  .add-btn:active { transform: scale(0.97); }

  .meta-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .meta-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    outline: none;
    transition: border 0.2s;
  }
  .meta-input:focus { border-color: var(--accent3); }
  select.meta-input option { background: var(--surface); }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    color: #0d0d0f;
    border-color: var(--accent);
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.25s;
    animation: slideIn 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .task-item.priority-high::before { background: var(--accent2); }
  .task-item.priority-medium::before { background: #f5a623; }
  .task-item.priority-low::before { background: var(--accent3); }
  .task-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .task-item.done { opacity: var(--done-opacity); }
  .task-item.done .task-text { text-decoration: line-through; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .checkbox {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .checkbox.checked { background: var(--accent); border-color: var(--accent); }
  .checkbox.checked::after { content: '✓'; color: #0d0d0f; font-size: 12px; font-weight: 700; }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 0.9rem; line-height: 1.4; word-break: break-word; margin-bottom: 6px; }

  .task-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .tag {
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .tag.cat { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .tag.pri-high { background: rgba(255,107,107,0.15); color: var(--accent2); }
  .tag.pri-medium { background: rgba(245,166,35,0.15); color: #f5a623; }
  .tag.pri-low { background: rgba(107,207,255,0.15); color: var(--accent3); }

  .reminder-tag { font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .reminder-tag.overdue { color: var(--accent2); }
  .reminder-tag.soon { color: #f5a623; }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 6px;
    transition: all 0.15s;
    flex-shrink: 0;
    opacity: 0;
  }
  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(255,107,107,0.15); color: var(--accent2); }

  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 12px; }

  .notif {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 0.82rem;
    color: var(--text);
    box-shadow: var(--shadow);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    max-width: 320px;
  }
  .notif.show { transform: translateY(0); opacity: 1; }
  .notif-title { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 2px; color: var(--accent); }

  .progress-wrap { margin-bottom: 28px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

  @media (max-width: 600px) {
    header { padding: 18px 16px; }
    main { padding: 24px 14px 0; }
    .input-row { flex-direction: column; }
    .add-btn { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">task<span>flow</span></div>
  <div class="header-right">
    <div class="stats" id="stats">0 tasks</div>
    <div class="toggle-wrap">
      <span class="toggle-label" id="theme-label">Dark</span>
      <div class="toggle" id="themeToggle" title="Toggle theme"></div>
    </div>
  </div>
</header>

<main>
  <div class="input-card">
    <div class="input-row">
      <input class="task-input" id="taskInput" type="text" placeholder="What needs to be done?" maxlength="200" />
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
    <div class="meta-row">
      <input class="meta-input" id="reminderInput" type="datetime-local" title="Set reminder" />
      <select class="meta-input" id="priorityInput">
        <option value="medium">⬤ Medium priority</option>
        <option value="high">⬤ High priority</option>
        <option value="low">⬤ Low priority</option>
      </select>
      <input class="meta-input" id="categoryInput" type="text" placeholder="Category (e.g. Work)" maxlength="20" style="width:160px" />
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressText">0 / 0 done</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
    <button class="filter-btn" onclick="setFilter('today', this)">📅 Today</button>
  </div>

  <div class="section-label" id="listLabel">All Tasks</div>
  <div class="task-list" id="taskList"></div>
</main>

<div class="notif" id="notif">
  <div class="notif-title" id="notifTitle">⏰ Reminder</div>
  <div id="notifBody"></div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
  let filter = 'all';

  const toggle = document.getElementById('themeToggle');
  const themeLabel = document.getElementById('theme-label');
  let theme = localStorage.getItem('taskflow_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  themeLabel.textContent = theme === 'dark' ? 'Dark' : 'Light';

  toggle.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    themeLabel.textContent = theme === 'dark' ? 'Dark' : 'Light';
    localStorage.setItem('taskflow_theme', theme);
  });

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  function addTask() {
    const text = document.getElementById('taskInput').value.trim();
    if (!text) return;
    const reminder = document.getElementById('reminderInput').value;
    const priority = document.getElementById('priorityInput').value;
    const category = document.getElementById('categoryInput').value.trim();

    tasks.unshift({ id: Date.now(), text, done: false, priority, category, reminder, created: Date.now() });
    save(); render();

    document.getElementById('taskInput').value = '';
    document.getElementById('reminderInput').value = '';
    document.getElementById('categoryInput').value = '';
    document.getElementById('priorityInput').value = 'medium';
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const labels = { all: 'All Tasks', active: 'Active Tasks', done: 'Completed', high: 'High Priority', today: 'Due Today' };
    document.getElementById('listLabel').textContent = labels[f];
    render();
  }

  function getFiltered() {
    const todayStr = new Date().toDateString();
    return tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      if (filter === 'high') return t.priority === 'high';
      if (filter === 'today') return t.reminder && new Date(t.reminder).toDateString() === todayStr;
      return true;
    });
  }

  function reminderStatus(reminder) {
    if (!reminder) return null;
    const now = Date.now();
    const rt = new Date(reminder).getTime();
    const diff = rt - now;
    if (diff < 0) return { label: '⏰ Overdue', cls: 'overdue' };
    if (diff < 3600000) return { label: '⚡ Due soon', cls: 'soon' };
    const d = new Date(reminder);
    return { label: `📅 ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`, cls: '' };
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const list = document.getElementById('taskList');
    const filtered = getFiltered();
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;

    document.getElementById('stats').textContent = `${total} task${total !== 1 ? 's' : ''}`;

    const pw = document.getElementById('progressWrap');
    if (total > 0) {
      pw.style.display = 'block';
      document.getElementById('progressText').textContent = `${done} / ${total} done`;
      document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
    } else {
      pw.style.display = 'none';
    }

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">✦</div>No tasks here yet.<br>Add one above to get started.</div>`;
      return;
    }

    list.innerHTML = filtered.map(t => {
      const rs = reminderStatus(t.reminder);
      return `
        <div class="task-item priority-${t.priority} ${t.done ? 'done' : ''}">
          <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleDone(${t.id})"></div>
          <div class="task-body">
            <div class="task-text">${escHtml(t.text)}</div>
            <div class="task-meta">
              ${t.category ? `<span class="tag cat">${escHtml(t.category)}</span>` : ''}
              <span class="tag pri-${t.priority}">${t.priority}</span>
              ${rs ? `<span class="reminder-tag ${rs.cls}">${rs.label}</span>` : ''}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
        </div>`;
    }).join('');
  }

  function save() { localStorage.setItem('taskflow_tasks', JSON.stringify(tasks)); }

  function checkReminders() {
    const now = Date.now();
    tasks.forEach(t => {
      if (!t.done && t.reminder && !t.notified) {
        const rt = new Date(t.reminder).getTime();
        if (rt <= now && rt > now - 60000) {
          t.notified = true; save();
          showNotif('⏰ Reminder', t.text);
        }
      }
    });
  }

  function showNotif(title, body) {
    document.getElementById('notifTitle').textContent = title;
    document.getElementById('notifBody').textContent = body;
    const n = document.getElementById('notif');
    n.classList.add('show');
    setTimeout(() => n.classList.remove('show'), 5000);
  }

  setInterval(checkReminders, 30000);
  render();
</script>
</body>
</html>
